<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Климатици ЕООД</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .test-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .response {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .response.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .response.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .response.info {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
            color: #0c5460;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .status-badge.online {
            background: #28a745;
            color: white;
        }

        .status-badge.offline {
            background: #dc3545;
            color: white;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader.active {
            display: block;
        }

        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧪 API Test Dashboard</h1>

    <!-- REGISTER TEST -->
    <div class="test-section">
        <h2>
            📝 Register (Регистрация)
            <span class="status-badge" id="register-status">Тествай</span>
        </h2>
        <form id="registerForm">
            <div class="grid">
                <div class="form-group">
                    <label>Имейл:</label>
                    <input type="email" id="reg-email" value="test@klimatici.bg" required>
                </div>
                <div class="form-group">
                    <label>Парола:</label>
                    <input type="password" id="reg-password" value="test123" required>
                </div>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>Пълно име:</label>
                    <input type="text" id="reg-name" value="Тест Потребител" required>
                </div>
                <div class="form-group">
                    <label>Телефон:</label>
                    <input type="text" id="reg-phone" value="0888123456" required>
                </div>
            </div>
            <div class="form-group">
                <label>Тип потребител:</label>
                <select id="reg-type" required>
                    <option value="client">Клиент</option>
                    <option value="employee">Служител</option>
                    <option value="admin">Администратор</option>
                </select>
            </div>
            <button type="submit">🚀 Тествай Register API</button>
        </form>
        <div class="loader" id="register-loader">
            <div class="loader-spinner"></div>
            <p>Изпращане...</p>
        </div>
        <div id="register-response"></div>
    </div>

    <!-- LOGIN TEST -->
    <div class="test-section">
        <h2>
            🔐 Login (Влизане)
            <span class="status-badge" id="login-status">Тествай</span>
        </h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Имейл:</label>
                <input type="email" id="login-email" value="test@klimatici.bg" required>
            </div>
            <div class="form-group">
                <label>Парола:</label>
                <input type="password" id="login-password" value="test123" required>
            </div>
            <button type="submit">🚀 Тествай Login API</button>
        </form>
        <div class="loader" id="login-loader">
            <div class="loader-spinner"></div>
            <p>Изпращане...</p>
        </div>
        <div id="login-response"></div>
    </div>

    <!-- QUICK TESTS -->
    <div class="test-section">
        <h2>⚡Бързи тестове</h2>
        <div class="grid">
            <button onclick="testDatabaseConnection()">🗄️ Тест връзка с база данни</button>
            <button onclick="testAdminLogin()">👨‍💼 Тест Admin Login</button>
            <button onclick="clearAllResponses()">🧹 Изчисти резултати</button>
        </div>
        <div id="quick-response"></div>
    </div>
</div>

<script>
    // API Base URL
    const API_URL = 'http://localhost/Diplomna/api';

    // Register Form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const loader = document.getElementById('register-loader');
        const responseDiv = document.getElementById('register-response');
        const statusBadge = document.getElementById('register-status');
        
        loader.classList.add('active');
        responseDiv.innerHTML = '';
        
        const data = {
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
            full_name: document.getElementById('reg-name').value,
            phone: document.getElementById('reg-phone').value,
            user_type: document.getElementById('reg-type').value
        };
        
        try {
            const response = await fetch(`${API_URL}/auth/register.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            loader.classList.remove('active');
            responseDiv.className = `response ${result.success ? 'success' : 'error'}`;
            responseDiv.textContent = JSON.stringify(result, null, 2);
            
            statusBadge.textContent = result.success ? 'Успешно' : 'Грешка';
            statusBadge.className = `status-badge ${result.success ? 'online' : 'offline'}`;
            
        } catch (error) {
            loader.classList.remove('active');
            responseDiv.className = 'response error';
            responseDiv.textContent = `Грешка: ${error.message}\n\nПроверете дали:\n1. XAMPP Apache и MySQL са пуснати\n2. Файлът register.php съществува\n3. URL-ът е правилен`;
            
            statusBadge.textContent = 'Offline';
            statusBadge.className = 'status-badge offline';
        }
    });

    // Login Form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const loader = document.getElementById('login-loader');
        const responseDiv = document.getElementById('login-response');
        const statusBadge = document.getElementById('login-status');
        
        loader.classList.add('active');
        responseDiv.innerHTML = '';
        
        const data = {
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
        };
        
        try {
            const response = await fetch(`${API_URL}/auth/login.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            loader.classList.remove('active');
            responseDiv.className = `response ${result.success ? 'success' : 'error'}`;
            responseDiv.textContent = JSON.stringify(result, null, 2);
            
            statusBadge.textContent = result.success ? 'Успешно' : 'Грешка';
            statusBadge.className = `status-badge ${result.success ? 'online' : 'offline'}`;
            
        } catch (error) {
            loader.classList.remove('active');
            responseDiv.className = 'response error';
            responseDiv.textContent = `Грешка: ${error.message}\n\nПроверете дали:\n1. XAMPP Apache и MySQL са пуснати\n2. Файлът login.php съществува\n3. URL-ът е правилен`;
            
            statusBadge.textContent = 'Offline';
            statusBadge.className = 'status-badge offline';
        }
    });

    // Test Database Connection
    async function testDatabaseConnection() {
        const responseDiv = document.getElementById('quick-response');
        responseDiv.className = 'response info';
        responseDiv.textContent = 'Тестване на връзката с базата данни...';
        
        try {
            // Опитваме се да направим login с admin акаунта който добавихме в SQL-а
            const response = await fetch(`${API_URL}/auth/login.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: 'admin@klimatici.bg',
                    password: 'admin123' // Тази парола няма да работи защото в SQL-а е хеширана неправилно
                })
            });
            
            const result = await response.json();
            
            if (response.ok || result.message) {
                responseDiv.className = 'response success';
                responseDiv.textContent = '✅ Връзката с базата данни работи!\n\nAPI-то успешно се свързва с MySQL базата klimatici_db.';
            } else {
                throw new Error('Няма връзка');
            }
            
        } catch (error) {
            responseDiv.className = 'response error';
            responseDiv.textContent = `❌ Грешка при свързване с базата данни!\n\n${error.message}\n\nПроверете:\n1. MySQL сървърът е пуснат\n2. config.php има правилни настройки\n3. База данни klimatici_db съществува`;
        }
    }

    // Test Admin Login
    async function testAdminLogin() {
        const responseDiv = document.getElementById('quick-response');
        responseDiv.className = 'response info';
        responseDiv.textContent = 'Тестване на admin login...';
        
        // Първо регистрираме admin
        try {
            const regResponse = await fetch(`${API_URL}/auth/register.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: 'admin@klimatici.bg',
                    password: 'admin123',
                    full_name: 'Администратор',
                    phone: '0888999000',
                    user_type: 'admin'
                })
            });
            
            const regResult = await regResponse.json();
            
            if (regResult.success) {
                responseDiv.className = 'response success';
                responseDiv.textContent = `✅ Admin акаунт създаден успешно!\n\n${JSON.stringify(regResult, null, 2)}\n\nСега можете да влезете с:\nИмейл: admin@klimatici.bg\nParola: admin123`;
            } else {
                responseDiv.className = 'response info';
                responseDiv.textContent = `ℹ️ ${regResult.message}\n\nАко акаунтът вече съществува, опитайте да влезете с:\nИмейл: admin@klimatici.bg\nParola: admin123`;
            }
            
        } catch (error) {
            responseDiv.className = 'response error';
            responseDiv.textContent = `❌ Грешка: ${error.message}`;
        }
    }

    // Clear All Responses
    function clearAllResponses() {
        document.getElementById('register-response').innerHTML = '';
        document.getElementById('login-response').innerHTML = '';
        document.getElementById('quick-response').innerHTML = '';
        
        document.getElementById('register-status').textContent = 'Тествай';
        document.getElementById('register-status').className = 'status-badge';
        document.getElementById('login-status').textContent = 'Тествай';
        document.getElementById('login-status').className = 'status-badge';
    }
</script>

</body>
</html>
